cat > ~/project1/.github/workflows/deploy.yml << 'EOF'
name: CI/CD Pipeline
on:
  push:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install pandas azure-storage-blob
      - run: python -c "import pandas; print('OK')"
EOF
